project:
  name: bidmate-rag

paths:
  raw_data_dir: data/raw
  metadata_csv: data/raw/data_list.csv
  processed_dir: data/v2
  index_dir: checkpoints/chroma_openai
  evaluation_set: data/v2/eval_questions.jsonl
  evaluation_output: outputs/eval_results.jsonl

openai:
  embedding_model: text-embedding-3-small
  generation_model: gpt-5-mini

vector_store:
  provider: chroma
  index_type: hnsw
  distance_metric: cosine

chunking:
  chunk_size: 1200
  chunk_overlap: 200
  min_chunk_chars: 80

retrieval:
  top_k: 8
  score_threshold: 0.25
  hybrid:
    enabled: true
    dense_top_k: 20
    bm25_top_k: 20
    rrf_k: 60
  reranker:
    enabled: true
    model: BAAI/bge-reranker-v2-m3
    top_k: 10
    device: auto

generation:
  max_context_chars: 12000
  temperature: 0.2
